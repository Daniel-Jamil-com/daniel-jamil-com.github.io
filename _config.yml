# ================================
# Site Settings
# ================================

title: Daniel Jamil
description: OCI & OCVS | VMware Architect

url: "https://daniel-jamil-com.github.io"
baseurl: ""

timezone: Europe/Madrid
lang: en

# ================================
# Build Settings
# ================================

markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title/

future: false
excerpt_separator: "<!--more-->"

# ================================
# GitHub Pages Defaults
# ================================

plugins:
  - jekyll-feed
  - jekyll-sitemap

# ================================
# Author (optional but recommended)
# ================================

author:
  name: Daniel Jamil
  role: Virtualization & Cloud Architect
  location: Europe
  bio: Enterprise OCI & OCVS architecture, migration frameworks, and infrastructure modernization.
  links:
    - label: LinkedIn
      url: https://linkedin.com
    - label: GitHub
      url: https://github.com/daniel-jamil-com

# ================================
# SEO Defaults
# ================================

defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/og-image.png
      layout: post

# ================================
# Exclude from Build
# ================================

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
